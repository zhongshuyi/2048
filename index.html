<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2048</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;800;900&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
    <link rel="stylesheet" href="./assets/main.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div class="title-area">
          <h1 class="title">2048</h1>
          <p class="subtitle">用方向键、滑动或拖拽移动方块，合成更大的数字。</p>
        </div>

        <div class="panel">
          <div class="scores">
            <div class="score-card">
              <div class="score-label">SCORE</div>
              <div class="score-value" id="scoreValue">0</div>
            </div>
            <div class="score-card">
              <div class="score-label">BEST</div>
              <div class="score-value" id="bestValue">0</div>
            </div>
          </div>

          <div class="actions">
            <button class="btn" id="newGameBtn" type="button">New Game</button>
          </div>
        </div>
      </header>

      <div class="grid-bar">
        <span class="grid-bar-label">网格</span>
        <div class="grid-seg">
          <input type="radio" id="gs4" name="gridSize" value="4" checked />
          <label class="grid-seg-label" for="gs4">4×4</label>

          <input type="radio" id="gs5" name="gridSize" value="5" />
          <label class="grid-seg-label" for="gs5">5×5</label>

          <input type="radio" id="gs6" name="gridSize" value="6" />
          <label class="grid-seg-label" for="gs6">6×6</label>

          <div class="grid-seg-pill" aria-hidden="true"></div>
        </div>
      </div>

      <section class="game-area">
        <div class="status" id="statusText" aria-live="polite"></div>

        <div class="board" id="board" aria-label="2048 棋盘" role="application">
          <div class="stage" id="stage" aria-hidden="true"></div>

          <div class="overlay" id="overlay" hidden>
            <div class="overlay-card">
              <div class="overlay-title" id="overlayTitle">Game over!</div>
              <div class="overlay-actions">
                <button class="btn btn-primary" id="tryAgainBtn" type="button">Try again</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="./js/storage.js"></script>
    <script src="./js/game-engine.js"></script>
    <script src="./vendor/pixi.min.js"></script>
    <script src="./js/ui-renderer.js"></script>
    <script src="./js/input.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
